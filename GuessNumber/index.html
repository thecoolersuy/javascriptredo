<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<link rel="stylesheet" href="styles.css"
<body>
    <div class="container">
        <h1 class="heading1">Number guessing game</h1>
        <p class="description">Try to guess a random number between 1 and 100<br> You have 10 attempts to guess the right number</p>
        <h2 class="heading2">Guess a number</h2>
        <form>
            <input type="text" class="input-box"><br><br>
            <input type="submit" class="button" value:"Submitguess">
        </form>
        <div class="previousGuess"></div>
        <div class="remainingGuess"></div>
        <p class ="hint"></p>
        <p class="result"></p>
    
    </div>
</body>
<script src="script.js"></script>
</html>
